<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" role="img" aria-labelledby="title desc">
  <title id="title">Independent one-percent errors over repeated operations</title>
  <desc id="desc">A simplified chart shows the probability of no flip falling as the number of operations increases.</desc>
  <rect width="900" height="430" fill="#f8fafc"/>
  <rect x="42" y="34" width="816" height="362" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="450" y="82" text-anchor="middle" font-family="Cambria Math, STIX Two Math, serif" font-size="28" fill="#0f172a">P(no flip) = (1 − 0.01)ⁿ</text>
  <line x1="112" y1="330" x2="800" y2="330" stroke="#64748b" stroke-width="2"/>
  <line x1="112" y1="130" x2="112" y2="330" stroke="#64748b" stroke-width="2"/>
  <text x="98" y="137" text-anchor="end" font-family="Arial, sans-serif" font-size="15" fill="#475569">100%</text>
  <text x="98" y="234" text-anchor="end" font-family="Arial, sans-serif" font-size="15" fill="#475569">50%</text>
  <text x="98" y="335" text-anchor="end" font-family="Arial, sans-serif" font-size="15" fill="#475569">0%</text>

  <rect x="164" y="132" width="96" height="198" rx="5" fill="#2563eb"/>
  <text x="212" y="121" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1d4ed8">99.0%</text>
  <text x="212" y="358" text-anchor="middle" font-family="Cambria Math, STIX Two Math, serif" font-size="19" fill="#334155">n = 1</text>

  <rect x="326" y="149" width="96" height="181" rx="5" fill="#0ea5e9"/>
  <text x="374" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0369a1">90.4%</text>
  <text x="374" y="358" text-anchor="middle" font-family="Cambria Math, STIX Two Math, serif" font-size="19" fill="#334155">n = 10</text>

  <rect x="488" y="209" width="96" height="121" rx="5" fill="#8b5cf6"/>
  <text x="536" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#6d28d9">60.5%</text>
  <text x="536" y="358" text-anchor="middle" font-family="Cambria Math, STIX Two Math, serif" font-size="19" fill="#334155">n = 50</text>

  <rect x="650" y="257" width="96" height="73" rx="5" fill="#f97316"/>
  <text x="698" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#c2410c">36.6%</text>
  <text x="698" y="358" text-anchor="middle" font-family="Cambria Math, STIX Two Math, serif" font-size="19" fill="#334155">n = 100</text>
</svg>
