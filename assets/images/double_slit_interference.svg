<svg xmlns="http://www.w3.org/2000/svg" width="860" height="430" viewBox="0 0 860 430" role="img" aria-labelledby="title desc">
  <title id="title">Double slit interference diagram</title>
  <desc id="desc">A source sends waves through two slits, producing alternating bright and dark bands on a screen.</desc>
  <rect width="860" height="430" fill="#f8fafc"/>
  <rect x="40" y="42" width="780" height="346" rx="18" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="76" y="88" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#0f172a">Two paths can meet again</text>
  <text x="76" y="118" font-family="Arial, sans-serif" font-size="16" fill="#475569">Where waves arrive in step, the result grows. Where they arrive out of step, it fades.</text>
  <circle cx="120" cy="230" r="16" fill="#2563eb"/>
  <text x="86" y="276" font-family="Arial, sans-serif" font-size="15" fill="#1e3a8a">source</text>
  <rect x="250" y="145" width="18" height="170" rx="8" fill="#334155"/>
  <rect x="248" y="188" width="22" height="28" rx="8" fill="#f8fafc"/>
  <rect x="248" y="244" width="22" height="28" rx="8" fill="#f8fafc"/>
  <text x="224" y="342" font-family="Arial, sans-serif" font-size="15" fill="#334155">two slits</text>
  <path d="M138 230 C168 190, 206 188, 248 202" fill="none" stroke="#60a5fa" stroke-width="4"/>
  <path d="M138 230 C172 272, 208 274, 248 258" fill="none" stroke="#60a5fa" stroke-width="4"/>
  <g fill="none" stroke-width="3">
    <path d="M278 202 C350 132, 460 132, 560 202" stroke="#2563eb" opacity=".75"/>
    <path d="M278 202 C378 186, 480 196, 560 230" stroke="#2563eb" opacity=".55"/>
    <path d="M278 258 C372 298, 470 300, 560 258" stroke="#7c3aed" opacity=".75"/>
    <path d="M278 258 C380 242, 482 234, 560 230" stroke="#7c3aed" opacity=".55"/>
  </g>
  <rect x="650" y="126" width="40" height="220" rx="14" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/>
  <rect x="698" y="135" width="70" height="18" rx="9" fill="#f59e0b"/>
  <rect x="698" y="168" width="70" height="10" rx="5" fill="#94a3b8"/>
  <rect x="698" y="196" width="70" height="24" rx="12" fill="#f59e0b"/>
  <rect x="698" y="242" width="70" height="10" rx="5" fill="#94a3b8"/>
  <rect x="698" y="270" width="70" height="24" rx="12" fill="#f59e0b"/>
  <rect x="698" y="320" width="70" height="10" rx="5" fill="#94a3b8"/>
  <text x="656" y="374" font-family="Arial, sans-serif" font-size="15" fill="#334155">screen</text>
</svg>
