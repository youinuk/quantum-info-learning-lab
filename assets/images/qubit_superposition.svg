<svg xmlns="http://www.w3.org/2000/svg" width="900" height="470" viewBox="0 0 900 470" role="img" aria-labelledby="title desc">
  <title id="title">Qubit amplitudes and measurement probabilities</title>
  <desc id="desc">The alpha and beta amplitudes of a qubit state lead to the probabilities of measuring zero and one.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="900" height="470" fill="#f8fafc"/>
  <rect x="42" y="34" width="816" height="402" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="450" y="92" text-anchor="middle" font-family="Cambria Math, STIX Two Math, serif" font-size="31" fill="#0f172a">|ψ⟩ = α|0⟩ + β|1⟩</text>

  <rect x="106" y="138" width="270" height="118" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
  <text x="241" y="190" text-anchor="middle" font-family="Cambria Math, STIX Two Math, serif" font-size="31" fill="#1d4ed8">α|0⟩</text>
  <text x="241" y="226" text-anchor="middle" font-family="Cambria Math, STIX Two Math, serif" font-size="21" fill="#475569">amplitude α</text>

  <text x="450" y="205" text-anchor="middle" font-family="Cambria Math, STIX Two Math, serif" font-size="34" fill="#64748b">+</text>

  <rect x="524" y="138" width="270" height="118" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/>
  <text x="659" y="190" text-anchor="middle" font-family="Cambria Math, STIX Two Math, serif" font-size="31" fill="#6d28d9">β|1⟩</text>
  <text x="659" y="226" text-anchor="middle" font-family="Cambria Math, STIX Two Math, serif" font-size="21" fill="#475569">amplitude β</text>

  <line x1="241" y1="268" x2="241" y2="313" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="659" y1="268" x2="659" y2="313" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="106" y="326" width="270" height="72" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="241" y="371" text-anchor="middle" font-family="Cambria Math, STIX Two Math, serif" font-size="28" fill="#1e3a8a">P(0) = |α|²</text>
  <rect x="524" y="326" width="270" height="72" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="2"/>
  <text x="659" y="371" text-anchor="middle" font-family="Cambria Math, STIX Two Math, serif" font-size="28" fill="#5b21b6">P(1) = |β|²</text>
</svg>
