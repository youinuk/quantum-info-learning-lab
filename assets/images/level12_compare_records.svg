<svg xmlns="http://www.w3.org/2000/svg" width="820" height="320" viewBox="0 0 820 320" role="img" aria-labelledby="title desc">
  <title id="title">Comparing entangled records</title>
  <desc id="desc">Alice and Bob compare measurement records later and see correlations.</desc>
  <rect width="820" height="320" rx="8" fill="#f8fafc"/>
  <rect x="30" y="28" width="760" height="242" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="58" y="66" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#0f172a">The pattern appears when records are compared</text>
  <g>
    <rect x="85" y="102" width="250" height="126" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="112" y="133" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#1d4ed8">Alice record</text>
    <text x="112" y="166" font-family="Arial, sans-serif" font-size="18" fill="#334155">0 1 1 0 0 1</text>
    <text x="112" y="197" font-family="Arial, sans-serif" font-size="15" fill="#64748b">looks random alone</text>
  </g>
  <g>
    <rect x="485" y="102" width="250" height="126" rx="8" fill="#fff1f2" stroke="#fecdd3"/>
    <text x="512" y="133" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#be123c">Bob record</text>
    <text x="512" y="166" font-family="Arial, sans-serif" font-size="18" fill="#334155">0 1 1 0 0 1</text>
    <text x="512" y="197" font-family="Arial, sans-serif" font-size="15" fill="#64748b">looks random alone</text>
  </g>
  <path d="M345 165 H475" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="360" y="151" font-family="Arial, sans-serif" font-size="15" fill="#334155">compare later</text>
  <rect x="275" y="240" width="270" height="38" rx="8" fill="#ecfdf5" stroke="#86efac"/>
  <text x="302" y="265" font-family="Arial, sans-serif" font-size="15" fill="#166534">same basis: strong matching pattern</text>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#334155"/></marker></defs>
</svg>
