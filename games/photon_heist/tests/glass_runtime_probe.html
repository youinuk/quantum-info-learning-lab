<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Photon Heist Glass Runtime Probe</title>
  <script>
    window.__probeErrors = [];
    window.__probeSyntax = [];
    window.__probeCurrentScript = "inline";
    function probeSyntax(name, url) {
      try {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", url, false);
        xhr.send(null);
        new Function(xhr.responseText);
      } catch (error) {
        window.__probeSyntax.push(name + " | " + error.name + " | " + error.message);
      }
    }
    [
      ["streamlit_bridge.js", "../src/streamlit_bridge.js?v=20260708a"],
      ["optics.js", "../src/optics.js?v=20260708a"],
      ["glass_levels.js", "../src/glass_levels.js?v=20260708a"],
      ["text_fixes.js", "../src/text_fixes.js?v=20260708a"],
      ["glass_game.js", "../src/glass_game.js?v=20260708a"]
    ].forEach(function (item) { probeSyntax(item[0], item[1]); });
    window.addEventListener("error", function (event) {
      window.__probeErrors.push([
        window.__probeCurrentScript,
        event.message,
        event.filename,
        event.lineno,
        event.colno
      ].join(" | "));
    });
    window.addEventListener("load", function () {
      window.setTimeout(function () {
        var output = document.getElementById("probeOutput");
        var board = document.getElementById("glassBoard");
        var interaction = {
          loadedLevel: false,
          initialSvgChildren: board ? board.children.length : -1,
          rotationsAfterAim: null,
          angleAfterAim: null,
          successAfterAim: false
        };
        try {
          if (typeof loadGlassLevel === "function") {
            loadGlassLevel(1);
            interaction.loadedLevel = document.getElementById("glassStageId").textContent.indexOf("G0-2") !== -1;
            var minus = document.getElementById("rotateMinusBtn");
            if (minus) {
              minus.click();
              minus.click();
              minus.click();
              minus.click();
            }
            interaction.rotationsAfterAim = document.getElementById("glassRotationsValue").textContent;
            interaction.angleAfterAim = document.getElementById("glassAngleValue").textContent;
            interaction.successAfterAim = document.getElementById("glassStatusBox").classList.contains("success");
          }
        } catch (error) {
          window.__probeErrors.push("interaction | " + error.name + " | " + error.message);
        }
        var bodyText = document.body ? document.body.textContent : "";
        var badPatterns = ["쨌", "罐", "諛", "怨", "嫄", "援", "鍮", "吏", "痢", "?꾨", "?덉", "?묒", "?뚰", "?좊", "?"];
        output.textContent = JSON.stringify({
          syntax: window.__probeSyntax,
          errors: window.__probeErrors,
          title: document.getElementById("glassGameTitle").textContent,
          stageTitle: document.getElementById("glassStageTitle").textContent,
          svgChildren: board ? board.children.length : -1,
          interaction: interaction,
          badText: badPatterns.filter(function (pattern) { return bodyText.indexOf(pattern) !== -1; })
        });
      }, 300);
    });
  </script>
  <link rel="stylesheet" href="../styles/style.css?v=20260708a">
  <link rel="stylesheet" href="../styles/glass.css?v=20260708a">
</head>
<body>
  <main>
    <p id="glassChapter"></p>
    <h1 id="glassGameTitle"></h1>
    <button id="glassStageSelectBtn" type="button"></button>
    <button id="glassSoundBtn" type="button"></button>
    <a id="backToMirrors" href="../hub.html"></a>
    <label><span id="glassLanguageLabel"></span><select id="glassLanguageSelect"><option value="ko">ko</option><option value="en">en</option></select></label>
    <p id="glassStageId"></p>
    <h2 id="glassStageTitle"></h2>
    <span id="glassStarsLabel"></span>
    <div id="glassStars"></div>
    <div id="glassProgress"></div>
    <p id="glassStageIntro"></p>
    <section id="glassChallengeStrip" hidden><span class="challenge-icon"></span><span id="glassChallengeLabel"></span><span id="glassChallengeText"></span><span id="glassChallengeStatus"></span></section>
    <svg id="glassBoard" viewBox="0 0 800 800"></svg>
    <div id="glassStatusBox"><strong id="glassStatusTitle"></strong><p id="glassStatusText"></p></div>
    <div id="glassPredictionControl" hidden><strong id="glassPredictionQuestion"></strong><div id="glassPredictionOptions"></div><small id="glassPredictionFeedback"></small></div>
    <span id="incidenceLabel"></span><strong id="incidenceValue"></strong>
    <span id="refractionLabel"></span><strong id="refractionValue"></strong>
    <span id="glassAngleLabel"></span><strong id="glassAngleValue"></strong>
    <span id="glassRotationsLabel"></span><strong id="glassRotationsValue"></strong>
    <span id="glassTargetLabel"></span><strong id="glassTargetValue"></strong>
    <span id="glassIndexLabel"></span><strong id="glassIndexValue"></strong>
    <div id="glassShotControl" hidden><span id="glassShotsLabel"></span><strong id="glassShotsValue"></strong><button id="fireGlassBtn" type="button"></button></div>
    <div id="glassObjectiveTracker" hidden><span id="glassObjectiveTrackerLabel"></span><div><div id="glassShardStep"><b></b><span id="glassShardStepLabel"></span></div><div id="glassExitStep"><b></b><span id="glassExitStepLabel"></span></div></div></div>
    <button id="rotateMinusBtn" type="button"></button>
    <button id="rotatePlusBtn" type="button"></button>
    <div id="fineRotatePair" hidden><button id="fineRotateMinusBtn" type="button"></button><button id="fineRotatePlusBtn" type="button"></button></div>
    <button id="resetGlassBtn" type="button"></button>
    <button id="glassHintBtn" type="button"></button>
    <button id="prevGlassBtn" type="button"></button>
    <button id="nextGlassBtn" type="button"></button>
    <h3 id="glassNoteTitle"></h3>
    <p id="glassNoteText"></p>
    <div id="glassStageModal" hidden><h2 id="glassModalTitle"></h2><p id="glassProgressSummary"></p><div id="glassStageGrid"></div><button id="closeGlassModalBtn" type="button"></button><button id="resetGlassProgressBtn" type="button"></button></div>
    <div id="probeOutput">pending</div>
  </main>
  <script>window.__probeCurrentScript = "streamlit_bridge.js";</script>
  <script src="../src/streamlit_bridge.js?v=20260708a"></script>
  <script>window.__probeCurrentScript = "optics.js";</script>
  <script src="../src/optics.js?v=20260708a"></script>
  <script>window.__probeCurrentScript = "glass_levels.js";</script>
  <script src="../src/glass_levels.js?v=20260708a"></script>
  <script>window.__probeCurrentScript = "text_fixes.js";</script>
  <script src="../src/text_fixes.js?v=20260708a"></script>
  <script>window.__probeCurrentScript = "glass_game.js";</script>
  <script src="../src/glass_game.js?v=20260708a"></script>
  <script>window.__probeCurrentScript = "after-glass";</script>
</body>
</html>
