<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Qubit state as two possibilities</title>
  <desc id="desc">A simple qubit diagram showing a state before measurement and two possible measurement outcomes.</desc>
  <rect width="900" height="520" fill="#f7f8fb"/>
  <rect x="52" y="54" width="796" height="412" rx="18" fill="#ffffff" stroke="#cfd6e4" stroke-width="2"/>
  <text x="450" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#182233">Qubit before measurement</text>
  <text x="450" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#475569">|psi&gt; = alpha|0&gt; + beta|1&gt;</text>

  <circle cx="270" cy="286" r="92" fill="#e9f3ff" stroke="#2f80ed" stroke-width="5"/>
  <text x="270" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#1d4ed8">|0&gt;</text>
  <text x="270" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#1d4ed8">possibility</text>

  <circle cx="630" cy="286" r="92" fill="#f3ecff" stroke="#8b5cf6" stroke-width="5"/>
  <text x="630" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#6d28d9">|1&gt;</text>
  <text x="630" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#6d28d9">possibility</text>

  <path d="M373 286 C430 244, 470 244, 527 286" fill="none" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
  <path d="M373 286 C430 328, 470 328, 527 286" fill="none" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
  <text x="450" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#334155">one state</text>
  <text x="450" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#334155">two possible outcomes</text>

  <rect x="172" y="402" width="556" height="38" rx="19" fill="#eef2ff"/>
  <text x="450" y="427" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#334155">Measurement shows one result: 0 or 1</text>
</svg>
