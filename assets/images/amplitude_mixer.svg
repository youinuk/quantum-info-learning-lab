<svg xmlns="http://www.w3.org/2000/svg" width="860" height="430" viewBox="0 0 860 430" role="img" aria-labelledby="title desc">
  <title id="title">Amplitude mixer analogy</title>
  <desc id="desc">A mixer-like diagram showing that a qubit state combines the possibilities of zero and one with different weights.</desc>
  <rect width="860" height="430" fill="#f8fafc"/>
  <rect x="42" y="42" width="776" height="346" rx="18" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="76" y="88" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#0f172a">A qubit is like a possibility mixer</text>
  <text x="76" y="118" font-family="Arial, sans-serif" font-size="16" fill="#475569">Before measurement, the state carries weights for |0&gt; and |1&gt;.</text>
  <rect x="104" y="170" width="180" height="130" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="164" y="210" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1d4ed8">|0&gt;</text>
  <rect x="146" y="238" width="96" height="24" rx="12" fill="#2563eb"/>
  <text x="154" y="286" font-family="Arial, sans-serif" font-size="15" fill="#1e3a8a">large weight</text>
  <rect x="576" y="170" width="180" height="130" rx="16" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="636" y="210" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#b91c1c">|1&gt;</text>
  <rect x="638" y="238" width="56" height="24" rx="12" fill="#dc2626"/>
  <text x="632" y="286" font-family="Arial, sans-serif" font-size="15" fill="#991b1b">small weight</text>
  <path d="M300 232 C370 170, 480 170, 558 232" fill="none" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
  <path d="M300 246 C380 306, 478 306, 558 246" fill="none" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
  <circle cx="430" cy="238" r="58" fill="#ecfdf5" stroke="#059669" stroke-width="3"/>
  <text x="397" y="232" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#047857">state</text>
  <text x="370" y="260" font-family="Arial, sans-serif" font-size="15" fill="#065f46">measure once → 0 or 1</text>
</svg>
