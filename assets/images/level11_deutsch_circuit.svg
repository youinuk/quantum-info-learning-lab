<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="350" viewBox="0 0 1000 350" role="img" aria-labelledby="title desc">
  <title id="title">Two-qubit Deutsch algorithm circuit</title>
  <desc id="desc">Two qubits pass through H gates, one oracle, a final H on the first qubit, and measurement.</desc>
  <rect width="1000" height="350" rx="8" fill="#f8fafc"/>
  <rect x="24" y="24" width="952" height="302" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>

  <text x="48" y="112" font-family="Cambria Math, STIX Two Math, serif" font-size="20" fill="#0f172a">q0 |0⟩</text>
  <text x="48" y="230" font-family="Cambria Math, STIX Two Math, serif" font-size="20" fill="#0f172a">q1 |1⟩</text>
  <line x1="130" y1="104" x2="900" y2="104" stroke="#334155" stroke-width="4"/>
  <line x1="130" y1="222" x2="900" y2="222" stroke="#334155" stroke-width="4"/>

  <rect x="201" y="68" width="72" height="72" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <rect x="201" y="186" width="72" height="72" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="213" y="115" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#15803d">H</text>
  <text x="213" y="233" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#15803d">H</text>
  <text x="180" y="292" font-family="Arial, sans-serif" font-size="16" fill="#475569">PREPARE</text>

  <rect x="386" y="58" width="190" height="210" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
  <text x="449" y="145" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#92400e">U<tspan baseline-shift="sub" font-size="22">f</tspan></text>
  <text x="420" y="188" font-family="Arial, sans-serif" font-size="17" fill="#92400e">1 QUERY</text>
  <text x="429" y="292" font-family="Arial, sans-serif" font-size="16" fill="#475569">PHASE MARK</text>

  <rect x="676" y="68" width="72" height="72" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="688" y="115" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#1d4ed8">H</text>
  <text x="669" y="176" font-family="Arial, sans-serif" font-size="16" fill="#475569">INTERFERE</text>

  <rect x="824" y="68" width="72" height="72" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
  <path d="M840 119 Q860 81 880 119" fill="none" stroke="#991b1b" stroke-width="3"/>
  <line x1="860" y1="119" x2="860" y2="135" stroke="#991b1b" stroke-width="3"/>
  <text x="851" y="62" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#991b1b">M</text>
  <text x="824" y="176" font-family="Arial, sans-serif" font-size="16" fill="#475569">0 / 1</text>

  <line x1="748" y1="222" x2="900" y2="222" stroke="#334155" stroke-width="4"/>
  <text x="786" y="249" font-family="Arial, sans-serif" font-size="15" fill="#64748b">helper qubit</text>
</svg>
