<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Repeated trials reveal probability</title>
  <desc id="desc">A simple chart-like diagram showing that more repeated trials reveal a stable probability pattern.</desc>
  <rect width="900" height="520" fill="#f7f8fb"/>
  <text x="450" y="74" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#182233">Repeated trials reveal the pattern</text>
  <line x1="120" y1="400" x2="800" y2="400" stroke="#94a3b8" stroke-width="3"/>
  <line x1="120" y1="120" x2="120" y2="400" stroke="#94a3b8" stroke-width="3"/>
  <text x="104" y="128" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#64748b">ratio</text>
  <text x="800" y="438" text-anchor="end" font-family="Arial, sans-serif" font-size="16" fill="#64748b">number of trials</text>

  <line x1="120" y1="260" x2="800" y2="260" stroke="#22c55e" stroke-width="4" stroke-dasharray="10 10"/>
  <text x="810" y="266" font-family="Arial, sans-serif" font-size="16" fill="#15803d">expected</text>

  <polyline points="140,180 190,335 240,230 290,285 340,247 390,274 440,252 490,264 540,257 590,262 640,259 690,260 740,258" fill="none" stroke="#2563eb" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="140" cy="180" r="7" fill="#2563eb"/>
  <circle cx="240" cy="230" r="7" fill="#2563eb"/>
  <circle cx="440" cy="252" r="7" fill="#2563eb"/>
  <circle cx="740" cy="258" r="7" fill="#2563eb"/>

  <rect x="236" y="438" width="428" height="38" rx="19" fill="#eef2ff"/>
  <text x="450" y="463" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#334155">One result jumps around; many results settle down.</text>
</svg>
