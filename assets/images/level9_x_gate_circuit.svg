<svg xmlns="http://www.w3.org/2000/svg" width="760" height="220" viewBox="0 0 760 220" role="img" aria-labelledby="title desc">
  <title id="title">X gate circuit</title>
  <desc id="desc">A one-qubit circuit starting from zero, applying X, and measuring.</desc>
  <rect width="760" height="220" rx="8" fill="#f8fafc"/>
  <rect x="24" y="24" width="712" height="172" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="54" y="74" font-family="Arial, sans-serif" font-size="18" fill="#334155">q0</text>
  <text x="96" y="74" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">|0></text>
  <line x1="144" y1="68" x2="622" y2="68" stroke="#334155" stroke-width="3"/>
  <rect x="278" y="42" width="58" height="52" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="300" y="75" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1d4ed8">X</text>
  <rect x="512" y="42" width="62" height="52" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <path d="M527 76 Q543 49 559 76" fill="none" stroke="#991b1b" stroke-width="3"/>
  <line x1="543" y1="76" x2="543" y2="89" stroke="#991b1b" stroke-width="3"/>
  <text x="533" y="36" font-family="Arial, sans-serif" font-size="15" fill="#991b1b">M</text>
  <text x="148" y="137" font-family="Arial, sans-serif" font-size="16" fill="#475569">Start</text>
  <text x="260" y="137" font-family="Arial, sans-serif" font-size="16" fill="#475569">Flip 0 to 1</text>
  <text x="492" y="137" font-family="Arial, sans-serif" font-size="16" fill="#475569">Read one result</text>
</svg>
