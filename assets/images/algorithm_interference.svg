<svg xmlns="http://www.w3.org/2000/svg" width="860" height="430" viewBox="0 0 860 430" role="img" aria-labelledby="title desc">
  <title id="title">Algorithm interference idea</title>
  <desc id="desc">Quantum algorithm idea: wrong answers cancel while the desired answer is amplified.</desc>
  <rect width="860" height="430" fill="#f8fafc"/>
  <rect x="40" y="42" width="780" height="346" rx="18" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="76" y="88" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#0f172a">Quantum algorithms shape probabilities</text>
  <text x="76" y="118" font-family="Arial, sans-serif" font-size="16" fill="#475569">The goal is not to print every possibility. The goal is to make the useful result stand out.</text>
  <g font-family="Arial, sans-serif">
    <text x="120" y="168" font-size="18" font-weight="700" fill="#334155">Before interference</text>
    <line x1="124" y1="315" x2="330" y2="315" stroke="#334155" stroke-width="2"/>
    <rect x="142" y="238" width="36" height="77" fill="#94a3b8"/>
    <rect x="202" y="238" width="36" height="77" fill="#94a3b8"/>
    <rect x="262" y="238" width="36" height="77" fill="#94a3b8"/>
    <text x="146" y="340" font-size="14" fill="#334155">A</text>
    <text x="206" y="340" font-size="14" fill="#334155">B</text>
    <text x="266" y="340" font-size="14" fill="#334155">C</text>
    <path d="M382 260 H492" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
    <path d="M474 238 L496 260 L474 282" fill="none" stroke="#64748b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="390" y="230" font-size="16" fill="#475569">interference</text>
    <text x="560" y="168" font-size="18" font-weight="700" fill="#334155">After interference</text>
    <line x1="564" y1="315" x2="770" y2="315" stroke="#334155" stroke-width="2"/>
    <rect x="582" y="292" width="36" height="23" fill="#cbd5e1"/>
    <rect x="642" y="178" width="36" height="137" fill="#059669"/>
    <rect x="702" y="292" width="36" height="23" fill="#cbd5e1"/>
    <text x="586" y="340" font-size="14" fill="#334155">A</text>
    <text x="646" y="340" font-size="14" fill="#047857">B</text>
    <text x="706" y="340" font-size="14" fill="#334155">C</text>
    <text x="618" y="370" font-size="15" fill="#047857">useful answer grows</text>
  </g>
</svg>
