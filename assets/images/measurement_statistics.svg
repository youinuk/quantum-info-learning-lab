<svg xmlns="http://www.w3.org/2000/svg" width="860" height="430" viewBox="0 0 860 430" role="img" aria-labelledby="title desc">
  <title id="title">Repeated measurement statistics</title>
  <desc id="desc">One measurement gives a single dot, but many repeated measurements reveal a stable probability pattern.</desc>
  <rect width="860" height="430" fill="#f8fafc"/>
  <rect x="42" y="40" width="776" height="348" rx="18" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="76" y="88" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#0f172a">One result is not the state</text>
  <text x="76" y="118" font-family="Arial, sans-serif" font-size="16" fill="#475569">Repeat the same preparation many times to see the probability.</text>

  <rect x="90" y="168" width="160" height="150" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="126" y="202" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1d4ed8">1 trial</text>
  <circle cx="170" cy="246" r="25" fill="#2563eb"/>
  <text x="163" y="254" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#fff">1</text>
  <text x="120" y="292" font-family="Arial, sans-serif" font-size="14" fill="#1e3a8a">too little evidence</text>

  <path d="M282 244 H380" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <path d="M366 226 L384 244 L366 262" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="420" y="168" width="330" height="150" rx="14" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="452" y="202" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#047857">many trials</text>
  <line x1="468" y1="284" x2="704" y2="284" stroke="#334155" stroke-width="2"/>
  <line x1="468" y1="224" x2="468" y2="284" stroke="#334155" stroke-width="2"/>
  <rect x="500" y="244" width="54" height="40" fill="#2563eb"/>
  <rect x="620" y="212" width="54" height="72" fill="#059669"/>
  <text x="520" y="306" font-family="Arial, sans-serif" font-size="15" fill="#334155">0</text>
  <text x="640" y="306" font-family="Arial, sans-serif" font-size="15" fill="#334155">1</text>
  <text x="528" y="236" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#1e3a8a">about 1/3</text>
  <text x="648" y="204" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#065f46">about 2/3</text>
</svg>
