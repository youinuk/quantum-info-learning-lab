<svg xmlns="http://www.w3.org/2000/svg" width="820" height="300" viewBox="0 0 820 300" role="img" aria-labelledby="title desc">
  <title id="title">Noise versus probability</title>
  <desc id="desc">Quantum probability and hardware noise are different ideas.</desc>
  <rect width="820" height="300" rx="8" fill="#f8fafc"/>
  <rect x="28" y="26" width="764" height="238" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="54" y="64" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Probability is not the same as noise</text>
  <g>
    <rect x="70" y="96" width="300" height="118" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="94" y="130" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1d4ed8">Quantum probability</text>
    <text x="94" y="164" font-family="Arial, sans-serif" font-size="15" fill="#334155">The prepared state sets the pattern.</text>
    <text x="94" y="190" font-family="Arial, sans-serif" font-size="15" fill="#334155">Many measurements reveal it.</text>
  </g>
  <g>
    <rect x="450" y="96" width="300" height="118" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="474" y="130" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#c2410c">Hardware noise</text>
    <text x="474" y="164" font-family="Arial, sans-serif" font-size="15" fill="#334155">The device or environment disturbs results.</text>
    <text x="474" y="190" font-family="Arial, sans-serif" font-size="15" fill="#334155">It can hide the original pattern.</text>
  </g>
  <path d="M377 154 L443 154" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <text x="54" y="249" font-family="Arial, sans-serif" font-size="15" fill="#64748b">A noisy histogram is not automatically a new quantum state. It may be a disturbed readout.</text>
</svg>
