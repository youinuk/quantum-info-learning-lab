<svg xmlns="http://www.w3.org/2000/svg" width="760" height="250" viewBox="0 0 760 250" role="img" aria-labelledby="title desc">
  <title id="title">Phase difference 180 degrees</title>
  <desc id="desc">Two phase arrows point in opposite directions, producing a dark output.</desc>
  <rect width="760" height="250" rx="8" fill="#f8fafc"/>
  <rect x="24" y="24" width="712" height="188" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="52" y="63" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Phase difference: 180 degrees</text>
  <circle cx="205" cy="132" r="62" fill="#fff1f2" stroke="#fecdd3" stroke-width="2"/>
  <line x1="205" y1="132" x2="260" y2="132" stroke="#2563eb" stroke-width="7" stroke-linecap="round"/>
  <line x1="205" y1="132" x2="150" y2="132" stroke="#f43f5e" stroke-width="5" stroke-linecap="round"/>
  <text x="146" y="218" font-family="Arial, sans-serif" font-size="15" fill="#475569">opposite direction</text>
  <path d="M320 132 H480" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="500" y="97" width="150" height="70" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="528" y="139" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#b91c1c">bright cancels</text>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10z" fill="#334155"/></marker></defs>
</svg>
