<svg xmlns="http://www.w3.org/2000/svg" width="820" height="300" viewBox="0 0 820 300" role="img" aria-labelledby="title desc">
  <title id="title">Sampling statistics</title>
  <desc id="desc">Small samples wobble, while larger samples move closer to the expected probability.</desc>
  <rect width="820" height="300" rx="8" fill="#f8fafc"/>
  <rect x="28" y="26" width="764" height="238" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="54" y="64" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Same state, different number of measurements</text>
  <line x1="82" y1="215" x2="735" y2="215" stroke="#94a3b8" stroke-width="2"/>
  <line x1="82" y1="103" x2="735" y2="103" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="6 6"/>
  <text x="54" y="108" font-family="Arial, sans-serif" font-size="14" fill="#64748b">50%</text>
  <g>
    <text x="140" y="244" font-family="Arial, sans-serif" font-size="16" fill="#334155">10 shots</text>
    <rect x="138" y="131" width="42" height="84" rx="4" fill="#60a5fa"/>
    <text x="130" y="123" font-family="Arial, sans-serif" font-size="14" fill="#1d4ed8">about 70%</text>
  </g>
  <g>
    <text x="353" y="244" font-family="Arial, sans-serif" font-size="16" fill="#334155">100 shots</text>
    <rect x="363" y="114" width="42" height="101" rx="4" fill="#818cf8"/>
    <text x="348" y="106" font-family="Arial, sans-serif" font-size="14" fill="#4338ca">about 54%</text>
  </g>
  <g>
    <text x="575" y="244" font-family="Arial, sans-serif" font-size="16" fill="#334155">1000 shots</text>
    <rect x="593" y="104" width="42" height="111" rx="4" fill="#34d399"/>
    <text x="576" y="96" font-family="Arial, sans-serif" font-size="14" fill="#047857">near 50%</text>
  </g>
  <text x="54" y="278" font-family="Arial, sans-serif" font-size="15" fill="#64748b">One run can wobble. Repeated runs reveal the probability pattern.</text>
</svg>
