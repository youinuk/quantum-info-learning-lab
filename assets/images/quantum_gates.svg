<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Single-qubit gates</title>
  <desc id="desc">X, H, Z, and S single-qubit gates.</desc>
  <rect width="900" height="520" fill="#f7f8fb"/>
  <text x="450" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#182233">X · H · Z · S</text>
  <rect x="35" y="142" width="190" height="220" rx="8" fill="#ffffff" stroke="#cfd6e4" stroke-width="2"/><rect x="65" y="188" width="130" height="70" rx="8" fill="#dbeafe" stroke="#2f80ed" stroke-width="4"/><text x="130" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1d4ed8">X</text><text x="130" y="302" text-anchor="middle" font-family="Cambria Math,serif" font-size="18" fill="#334155">|0⟩ ↔ |1⟩</text>
  <rect x="248" y="142" width="190" height="220" rx="8" fill="#ffffff" stroke="#cfd6e4" stroke-width="2"/><rect x="278" y="188" width="130" height="70" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="4"/><text x="343" y="235" text-anchor="middle" font-family="Arial,sans-serif" font-size="34" font-weight="700" fill="#6d28d9">H</text><text x="343" y="302" text-anchor="middle" font-family="Cambria Math,serif" font-size="18" fill="#334155">|0⟩ → |+⟩</text>
  <rect x="461" y="142" width="190" height="220" rx="8" fill="#ffffff" stroke="#cfd6e4" stroke-width="2"/><rect x="491" y="188" width="130" height="70" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="4"/><text x="556" y="235" text-anchor="middle" font-family="Arial,sans-serif" font-size="34" font-weight="700" fill="#b91c1c">Z</text><text x="556" y="302" text-anchor="middle" font-family="Cambria Math,serif" font-size="18" fill="#334155">|1⟩ → −|1⟩</text>
  <rect x="674" y="142" width="190" height="220" rx="8" fill="#ffffff" stroke="#cfd6e4" stroke-width="2"/><rect x="704" y="188" width="130" height="70" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/><text x="769" y="235" text-anchor="middle" font-family="Arial,sans-serif" font-size="34" font-weight="700" fill="#15803d">S</text><text x="769" y="302" text-anchor="middle" font-family="Cambria Math,serif" font-size="18" fill="#334155">|1⟩ → i|1⟩</text>
  <rect x="300" y="410" width="300" height="42" rx="8" fill="#eef2ff"/><text x="450" y="437" text-anchor="middle" font-family="Cambria Math,serif" font-size="20" fill="#334155">|ψ⟩ → U|ψ⟩</text>
</svg>
