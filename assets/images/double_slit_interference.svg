<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Double-slit interference builds up from individual hits</title>
  <desc id="desc">Three panels show individual particle hits gradually forming a double-slit interference pattern.</desc>
  <defs>
    <radialGradient id="hit" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.35" stop-color="#bfdbfe"/>
      <stop offset="1" stop-color="#2563eb"/>
    </radialGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.48" stop-color="#172554"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <rect width="980" height="520" fill="#f8fafc"/>
  <rect x="34" y="30" width="912" height="446" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="66" y="78" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#0f172a">Double slit: dots first, stripes later</text>
  <text x="66" y="107" font-family="Arial, sans-serif" font-size="18" fill="#475569">Each detection is a single dot. After many detections, the dot density reveals an interference pattern.</text>

  <g transform="translate(72 138)">
    <g>
      <rect x="0" y="0" width="250" height="250" rx="16" fill="url(#screen)" stroke="#334155" stroke-width="2"/>
      <text x="0" y="-14" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#334155">1. A few particles</text>
      <g fill="url(#hit)">
        <circle cx="119" cy="48" r="3.8"/><circle cx="130" cy="79" r="3.6"/><circle cx="118" cy="111" r="3.9"/>
        <circle cx="139" cy="137" r="3.5"/><circle cx="104" cy="164" r="3.7"/><circle cx="130" cy="198" r="3.6"/>
        <circle cx="74" cy="70" r="3.4"/><circle cx="178" cy="96" r="3.4"/><circle cx="69" cy="175" r="3.2"/>
        <circle cx="184" cy="183" r="3.3"/><circle cx="99" cy="218" r="3.1"/>
      </g>
    </g>

    <g transform="translate(302 0)">
      <rect x="0" y="0" width="250" height="250" rx="16" fill="url(#screen)" stroke="#334155" stroke-width="2"/>
      <text x="0" y="-14" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#334155">2. More particles</text>
      <g fill="url(#hit)" opacity="0.95">
        <circle cx="123" cy="26" r="2.8"/><circle cx="125" cy="42" r="3.1"/><circle cx="118" cy="60" r="2.8"/>
        <circle cx="132" cy="81" r="3.4"/><circle cx="121" cy="96" r="3.2"/><circle cx="130" cy="116" r="3.4"/>
        <circle cx="118" cy="135" r="3.1"/><circle cx="131" cy="154" r="3.4"/><circle cx="120" cy="178" r="3.2"/>
        <circle cx="128" cy="199" r="3.1"/><circle cx="116" cy="219" r="2.8"/><circle cx="132" cy="232" r="2.6"/>
        <circle cx="82" cy="45" r="2.5"/><circle cx="74" cy="82" r="2.8"/><circle cx="86" cy="126" r="2.8"/>
        <circle cx="78" cy="165" r="2.6"/><circle cx="90" cy="205" r="2.6"/><circle cx="171" cy="42" r="2.5"/>
        <circle cx="181" cy="86" r="2.7"/><circle cx="168" cy="127" r="2.9"/><circle cx="179" cy="168" r="2.6"/>
        <circle cx="166" cy="211" r="2.6"/><circle cx="44" cy="74" r="2.1"/><circle cx="207" cy="76" r="2.1"/>
        <circle cx="43" cy="174" r="2.1"/><circle cx="210" cy="180" r="2.1"/>
      </g>
      <g stroke="#93c5fd" stroke-width="9" stroke-linecap="round" opacity="0.18" filter="url(#soft)">
        <line x1="124" y1="18" x2="124" y2="232"/>
        <line x1="82" y1="32" x2="82" y2="218"/>
        <line x1="174" y1="32" x2="174" y2="218"/>
      </g>
    </g>

    <g transform="translate(604 0)">
      <rect x="0" y="0" width="250" height="250" rx="16" fill="url(#screen)" stroke="#334155" stroke-width="2"/>
      <text x="0" y="-14" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#334155">3. Interference pattern</text>
      <g stroke="#dbeafe" stroke-linecap="round" filter="url(#soft)">
        <line x1="125" y1="16" x2="125" y2="234" stroke-width="24" opacity="0.95"/>
        <line x1="80" y1="26" x2="80" y2="224" stroke-width="14" opacity="0.7"/>
        <line x1="170" y1="26" x2="170" y2="224" stroke-width="14" opacity="0.7"/>
        <line x1="43" y1="46" x2="43" y2="204" stroke-width="7" opacity="0.45"/>
        <line x1="207" y1="46" x2="207" y2="204" stroke-width="7" opacity="0.45"/>
      </g>
      <g fill="#ffffff" opacity="0.92">
        <circle cx="119" cy="31" r="2.4"/><circle cx="129" cy="47" r="2.5"/><circle cx="123" cy="64" r="2.2"/>
        <circle cx="126" cy="83" r="2.6"/><circle cx="121" cy="101" r="2.2"/><circle cx="130" cy="118" r="2.5"/>
        <circle cx="123" cy="138" r="2.3"/><circle cx="127" cy="156" r="2.4"/><circle cx="119" cy="176" r="2.2"/>
        <circle cx="129" cy="194" r="2.5"/><circle cx="123" cy="215" r="2.3"/>
        <circle cx="78" cy="47" r="2.1"/><circle cx="84" cy="84" r="2.2"/><circle cx="78" cy="121" r="2.1"/>
        <circle cx="83" cy="161" r="2.1"/><circle cx="78" cy="200" r="2.1"/>
        <circle cx="169" cy="49" r="2.1"/><circle cx="174" cy="88" r="2.2"/><circle cx="168" cy="127" r="2.1"/>
        <circle cx="174" cy="164" r="2.1"/><circle cx="168" cy="204" r="2.1"/>
      </g>
    </g>
  </g>

  <g transform="translate(96 428)">
    <rect x="0" y="-22" width="18" height="18" rx="9" fill="#2563eb"/>
    <text x="28" y="-7" font-family="Arial, sans-serif" font-size="18" fill="#334155">single hit</text>
    <line x1="140" y1="-13" x2="188" y2="-13" stroke="#dbeafe" stroke-width="14" stroke-linecap="round"/>
    <text x="204" y="-7" font-family="Arial, sans-serif" font-size="18" fill="#334155">high hit density</text>
    <text x="470" y="-15" font-family="Arial, sans-serif" font-size="17" fill="#475569">One shot cannot show the pattern.</text>
    <text x="470" y="8" font-family="Arial, sans-serif" font-size="17" fill="#475569">The stripes appear only after many hits.</text>
  </g>
</svg>
