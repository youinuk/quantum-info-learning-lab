<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260" role="img" aria-labelledby="title desc">
  <title id="title">H gate interference circuit</title>
  <desc id="desc">A qubit starts in zero, passes through H, an optional I or Z operation, a final H highlighted as interference, and measurement.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="900" height="260" rx="8" fill="#f8fafc"/>
  <rect x="22" y="22" width="856" height="216" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>

  <text x="62" y="141" text-anchor="middle" font-family="Cambria Math, STIX Two Math, serif" font-size="22" fill="#0f172a">|0⟩</text>
  <line x1="92" y1="132" x2="826" y2="132" stroke="#334155" stroke-width="4"/>

  <rect x="168" y="96" width="72" height="72" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="204" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#15803d">H</text>
  <text x="204" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#475569">50:50</text>

  <rect x="330" y="76" width="174" height="112" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="3" stroke-dasharray="9 7"/>
  <text x="417" y="101" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#92400e">I / Z</text>
  <rect x="363" y="116" width="46" height="38" rx="5" fill="#ffffff" stroke="#94a3b8"/>
  <text x="386" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#475569">I</text>
  <rect x="429" y="116" width="46" height="38" rx="5" fill="#fef3c7" stroke="#d97706"/>
  <text x="452" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#b45309">Z</text>

  <text x="612" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1d4ed8">INTERFERENCE</text>
  <line x1="612" y1="54" x2="612" y2="83" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <rect x="576" y="96" width="72" height="72" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="612" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#1d4ed8">H</text>
  <text x="612" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#475569">+,+ / +,-</text>

  <rect x="738" y="96" width="72" height="72" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
  <path d="M754 144 Q774 106 794 144" fill="none" stroke="#991b1b" stroke-width="3"/>
  <line x1="774" y1="144" x2="774" y2="160" stroke="#991b1b" stroke-width="3"/>
  <text x="774" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#991b1b">M</text>
  <text x="774" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#475569">0 / 1</text>
</svg>
