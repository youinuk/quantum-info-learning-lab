<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="390" viewBox="0 0 1120 390" role="img" aria-labelledby="title desc">
  <title id="title">Quantum teleportation circuit</title>
  <desc id="desc">A preparation device starts Bell qubits A and B in zero states and creates a Bell pair. Alice combines an input qubit with Bell qubit A and measures bits a and b. Bit b controls Bob's X correction and bit a controls Bob's Z correction.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#0f766e"/>
    </marker>
    <style>
      .wire{stroke:#334155;stroke-width:3;fill:none}.classical{stroke:#0f766e;stroke-width:2.5;fill:none;stroke-dasharray:7 5}
      .gate{fill:#fff;stroke:#2563eb;stroke-width:2.5}.measure{fill:#ecfeff;stroke:#0f766e;stroke-width:2.5}
      .label{font:17px Arial,sans-serif;fill:#0f172a}.small{font:14px Arial,sans-serif;fill:#475569}.section{font:bold 16px Arial,sans-serif;fill:#334155}
      .bit{font:bold 15px Arial,sans-serif;fill:#0f766e}
    </style>
  </defs>
  <rect width="1120" height="390" fill="#ffffff"/>

  <rect x="20" y="55" width="255" height="245" rx="6" fill="#fff7ed" stroke="#fdba74"/>
  <rect x="300" y="25" width="470" height="275" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
  <rect x="790" y="25" width="305" height="275" rx="6" fill="#f0fdf4" stroke="#86efac"/>
  <text x="40" y="85" class="section">Bell-pair preparation</text>
  <text x="320" y="55" class="section">Alice</text>
  <text x="810" y="55" class="section">Bob</text>

  <text x="320" y="91" class="label">input |ψ⟩</text>
  <text x="320" y="166" class="small">Bell A arrives</text>
  <text x="810" y="246" class="small">Bell B arrives</text>
  <text x="32" y="181" class="small">A</text><text x="51" y="181" class="label">|0⟩</text>
  <text x="32" y="261" class="small">B</text><text x="51" y="261" class="label">|0⟩</text>

  <line x1="415" y1="100" x2="705" y2="100" class="wire"/>
  <line x1="85" y1="175" x2="705" y2="175" class="wire"/>
  <line x1="85" y1="255" x2="1065" y2="255" class="wire"/>

  <rect x="115" y="150" width="50" height="50" class="gate"/><text x="132" y="183" class="label">H</text>
  <circle cx="215" cy="175" r="7" fill="#2563eb"/><line x1="215" y1="175" x2="215" y2="255" stroke="#2563eb" stroke-width="3"/>
  <circle cx="215" cy="255" r="20" fill="#fff" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="215" y1="237" x2="215" y2="273" stroke="#2563eb" stroke-width="2.5"/><line x1="197" y1="255" x2="233" y2="255" stroke="#2563eb" stroke-width="2.5"/>
  <text x="78" y="290" class="small">H + CNOT create |Φ+⟩</text>

  <circle cx="465" cy="100" r="7" fill="#2563eb"/><line x1="465" y1="100" x2="465" y2="175" stroke="#2563eb" stroke-width="3"/>
  <circle cx="465" cy="175" r="20" fill="#fff" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="465" y1="157" x2="465" y2="193" stroke="#2563eb" stroke-width="2.5"/><line x1="447" y1="175" x2="483" y2="175" stroke="#2563eb" stroke-width="2.5"/>
  <rect x="515" y="75" width="50" height="50" class="gate"/><text x="532" y="108" class="label">H</text>

  <rect x="615" y="75" width="72" height="50" class="measure"/><text x="630" y="107" class="label">M</text><text x="657" y="106" class="bit">a</text>
  <rect x="615" y="150" width="72" height="50" class="measure"/><text x="630" y="182" class="label">M</text><text x="657" y="181" class="bit">b</text>

  <path d="M651 200 V315 H890 V280" class="classical" marker-end="url(#arrow)"/>
  <path d="M669 125 V342 H980 V280" class="classical" marker-end="url(#arrow)"/>
  <text x="705" y="310" class="bit">b controls X</text>
  <text x="805" y="337" class="bit">a controls Z</text>

  <rect x="865" y="230" width="50" height="50" class="gate"/><text x="882" y="263" class="label">X</text>
  <rect x="955" y="230" width="50" height="50" class="gate"/><text x="972" y="263" class="label">Z</text>
  <text x="858" y="218" class="small">if b = 1</text>
  <text x="948" y="218" class="small">if a = 1</text>
  <text x="1020" y="262" class="label">|ψ⟩</text>

  <text x="25" y="375" class="small">The Bell pair is prepared from |00⟩ before Alice processes the input. Bob restores the state after bits a and b arrive.</text>
</svg>
